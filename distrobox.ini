# distrobox-assemble manifest. Declares a reproducible dev box for this repo.
# distrobox shares your host $HOME, so chezmoi dotfiles, ~/.config/nvim and
# ~/.config/jj are already present inside — no bind-mounts needed.
#
#   distrobox assemble create              # build/refresh the box
#   distrobox enter resume                 # drop into it
#   distrobox assemble rm                  # tear it down
#
# Copy this file into other repos and change the [name] + packages per project.

[resume]
image=ubuntu:24.04
# Lighter than texlive-full (~500MB vs ~5GB). awesome-cv needs xelatex + these
# font/latex bundles. If a build complains about a missing .sty, swap in texlive-full.
# zoxide is apt-available; starship is installed in init_hooks below. direnv/keychain
# are intentionally omitted — the fish configs guard them, so they no-op in the box.
# gh: required by octo.nvim (reads your shared ~/.config/gh auth).
# wl-clipboard: nvim clipboard -> host (Wayland socket is already forwarded by distrobox).
# build-essential: nvim-treesitter compiles parsers, needs cc/g++.
# nodejs: your ~/.claude hooks call /usr/bin/node (hardcoded) + `env node`. unzip: bun installer needs it.
additional_packages="texlive-xetex texlive-latex-extra texlive-fonts-extra latexmk git curl ca-certificates zoxide gh wl-clipboard build-essential tmux nodejs unzip"
# jj isn't packaged in apt — pull the release binary into the box.
# -4 forces IPv4 (rootless podman's pasta net stalls on IPv6 to GitHub).
# tar member is "./jj" (archive has a leading ./), not "jj", or extraction finds nothing.
# Arch hardcoded to x86_64; on aarch64 swap the target to aarch64-unknown-linux-musl.
# starship isn't in apt either. One hook, ";"-separated so each install is independent
# (distrobox joins multiple init_hooks lines with && which tangles with the || guards).
# tmux wrapper: box shares host /tmp, so the default socket collides with the host's
# tmux server. Force a per-container socket (-L $CONTAINER_ID). Must dpkg-divert the real
# /usr/bin/tmux and take its place — a /usr/local/bin wrapper loses because the inherited
# fish PATH puts /usr/bin first, and tproj.fish calls `command tmux` / `exec tmux` (bypasses aliases).
# Wrapper (base64) is: #!/bin/sh\nexec /usr/bin/tmux.distrib -L "${CONTAINER_ID:-box}" "$@"
init_hooks="command -v jj >/dev/null || curl -4 -fsSL https://github.com/jj-vcs/jj/releases/download/v0.42.0/jj-v0.42.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin ./jj ; command -v starship >/dev/null || curl -4 -fsSL https://starship.rs/install.sh | sh -s -- -y -b /usr/local/bin ; test -e /usr/bin/tmux.distrib || dpkg-divert --local --rename --add /usr/bin/tmux ; echo IyEvYmluL3NoCmV4ZWMgL3Vzci9iaW4vdG11eC5kaXN0cmliIC1MICIke0NPTlRBSU5FUl9JRDotYm94fSIgIiRAIgo= | base64 -d > /usr/bin/tmux ; chmod +x /usr/bin/tmux ; command -v bun >/dev/null || curl -4 -fsSL https://bun.sh/install | BUN_INSTALL=/usr/local bash"
